<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Générateur de liens SMS</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --glass-bg: rgba(255, 255, 255, 0.55);
    --glass-border: rgba(255, 255, 255, 0.7);
    --glass-shadow: rgba(31, 38, 135, 0.15);
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --field-bg: rgba(255, 255, 255, 0.6);
    --field-border: rgba(0, 0, 0, 0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --glass-bg: rgba(30, 30, 40, 0.55);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-shadow: rgba(0, 0, 0, 0.4);
      --accent: #0a84ff;
      --accent-hover: #409cff;
      --text-primary: #f5f5f7;
      --text-secondary: #a1a1a6;
      --field-bg: rgba(255, 255, 255, 0.08);
      --field-border: rgba(255, 255, 255, 0.12);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #a8c0ff 0%, #c2a8ff 35%, #ffb8d9 70%, #ffd8a8 100%);
    background-attachment: fixed;
    min-height: 100vh; min-height: 100dvh;
    display: flex; justify-content: center; align-items: center;
    padding: env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 20px);
    color: var(--text-primary); -webkit-font-smoothing: antialiased;
  }
  body::before, body::after { content: ""; position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.5; z-index: 0; pointer-events: none; }
  body::before { width: 380px; height: 380px; background: radial-gradient(circle, #ff9de6, transparent 70%); top: -100px; left: -80px; animation: float1 14s ease-in-out infinite; }
  body::after { width: 420px; height: 420px; background: radial-gradient(circle, #6ec3ff, transparent 70%); bottom: -120px; right: -100px; animation: float2 18s ease-in-out infinite; }
  @keyframes float1 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(60px, 40px) scale(1.1); } }
  @keyframes float2 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-50px, -30px) scale(1.05); } }
  .card {
    --mx: 50%; --my: 0%;
    position: relative; overflow: hidden; width: 100%; max-width: 440px;
    background: var(--glass-bg); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%);
    border: 1px solid var(--glass-border); border-radius: 28px;
    box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 1px rgba(255, 255, 255, 0.4);
    padding: clamp(24px, 5vw, 40px); z-index: 1;
  }
  .card::before { content: ""; position: absolute; inset: 0; border-radius: inherit; background: radial-gradient(600px circle at var(--mx) var(--my), rgba(255, 255, 255, 0.35), transparent 45%); opacity: 0; transition: opacity 0.4s ease; pointer-events: none; z-index: 2; }
  .card.glow::before { opacity: 1; }
  .card > * { position: relative; z-index: 3; }
  @media (prefers-color-scheme: dark) { .card::before { background: radial-gradient(600px circle at var(--mx) var(--my), rgba(255, 255, 255, 0.12), transparent 45%); } }
  h1 { font-size: clamp(22px, 5vw, 28px); font-weight: 700; text-align: center; letter-spacing: -0.02em; margin-bottom: 6px; }
  .subtitle { text-align: center; color: var(--text-secondary); font-size: clamp(14px, 3vw, 16px); margin-bottom: 28px; }
  label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .field { margin-bottom: 20px; }
  input, textarea { width: 100%; background: var(--field-bg); border: 1px solid var(--field-border); border-radius: 14px; padding: 14px 16px; font-size: 16px; font-family: inherit; color: var(--text-primary); transition: border-color 0.2s, box-shadow 0.2s; }
  input::placeholder, textarea::placeholder { color: var(--text-secondary); }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.2); }
  textarea { resize: vertical; min-height: 90px; }
  .btn { width: 100%; border: none; border-radius: 14px; padding: 15px; font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease; }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(0, 113, 227, 0.4); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:active { transform: scale(0.97); }
  .result { margin-top: 28px; display: none; }
  .result.visible { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .url-row { display: flex; gap: 10px; align-items: stretch; }
  .url-box { flex: 1; background: var(--field-bg); border: 1px solid var(--field-border); border-radius: 14px; padding: 14px 16px; font-size: 14px; word-break: break-all; color: var(--text-primary); }
  .btn-copy { flex-shrink: 0; background: var(--field-bg); border: 1px solid var(--field-border); color: var(--accent); border-radius: 14px; padding: 0 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-copy:hover { background: rgba(0, 113, 227, 0.1); }
  .qr-wrap { display: flex; flex-direction: column; align-items: center; margin-top: 24px; }
  #qrcode { background: #fff; padding: 12px; border-radius: 18px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12); line-height: 0; }
  .btn-download { margin-top: 18px; background: var(--field-bg); border: 1px solid var(--field-border); color: var(--text-primary); }
  .btn-download:hover { background: rgba(0, 0, 0, 0.05); }
  .toast { position: fixed; bottom: calc(env(safe-area-inset-bottom, 20px) + 20px); left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(30, 30, 40, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: #fff; padding: 12px 24px; border-radius: 14px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3); opacity: 0; transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1), opacity 0.4s; z-index: 100; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  @media (max-width: 400px) { .url-row { flex-direction: column; } .btn-copy { padding: 12px; } }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; scroll-behavior: auto !important; } body::before, body::after { animation: none !important; } .card::before { transition: none !important; } }
</style>
</head>
<body>
  <div class="card">
    <h1 id="title"></h1>
    <p class="subtitle" id="subtitle"></p>
    <div class="field">
      <label id="phoneLabel" for="phone"></label>
      <input type="tel" id="phone" placeholder="">
    </div>
    <div class="field">
      <label id="textLabel" for="text"></label>
      <textarea id="text" placeholder=""></textarea>
    </div>
    <button class="btn btn-primary" id="generateBtn" onclick="generate()"></button>
    <div class="result" id="result">
      <div class="field" style="margin-top: 8px;">
        <label id="urlLabel"></label>
        <div class="url-row">
          <div class="url-box" id="urlBox"></div>
          <button class="btn-copy" id="copyBtn" onclick="copyLink()"></button>
        </div>
      </div>
      <div class="qr-wrap">
        <div id="qrcode"></div>
        <button class="btn btn-download" id="downloadBtn" onclick="downloadQR()"></button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
<script>
  const translations = {
    fr: { title: "Générateur de liens SMS", subtitle: "Créez une campagne SMS en quelques secondes", phoneLabel: "Numéro de téléphone", textLabel: "Message", generateBtn: "Générer", urlLabel: "Lien de campagne", copyBtn: "Copier", downloadBtn: "Télécharger le QR (JPG)", phonePlaceholder: "+1 514 555 0123", textPlaceholder: "Votre message...", alertPhone: "Veuillez saisir un numéro de téléphone.", copied: "Lien copié dans le presse-papiers !", docTitle: "Générateur de liens SMS" },
    en: { title: "SMS Link Generator", subtitle: "Create an SMS campaign in seconds", phoneLabel: "Phone number", textLabel: "Message", generateBtn: "Generate", urlLabel: "Campaign link", copyBtn: "Copy", downloadBtn: "Download QR (JPG)", phonePlaceholder: "+1 514 555 0123", textPlaceholder: "Your message...", alertPhone: "Please enter a phone number.", copied: "Link copied to clipboard!", docTitle: "SMS Link Generator" }
  };
  const STORAGE_KEY = 'sms-tool-lang';
  let currentLang = 'fr';
  let currentUrl = '';
  function detectInitialLang() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved && translations[saved]) return saved;
    const nav = (navigator.language || 'fr').toLowerCase();
    if (nav.startsWith('en')) return 'en';
    if (nav.startsWith('fr')) return 'fr';
    return 'fr';
  }
  function setLang(lang) {
    if (!translations[lang]) return;
    currentLang = lang;
    try { localStorage.setItem(STORAGE_KEY, lang); } catch (e) {}
    const t = translations[lang];
    document.documentElement.lang = lang;
    document.title = t.docTitle;
    document.getElementById('title').textContent = t.title;
    document.getElementById('subtitle').textContent = t.subtitle;
    document.getElementById('phoneLabel').textContent = t.phoneLabel;
    document.getElementById('textLabel').textContent = t.textLabel;
    document.getElementById('generateBtn').textContent = t.generateBtn;
    document.getElementById('urlLabel').textContent = t.urlLabel;
    document.getElementById('copyBtn').textContent = t.copyBtn;
    document.getElementById('downloadBtn').textContent = t.downloadBtn;
    document.getElementById('phone').placeholder = t.phonePlaceholder;
    document.getElementById('text').placeholder = t.textPlaceholder;
  }
  function generate() {
    const phone = document.getElementById('phone').value.trim();
    const text = document.getElementById('text').value.trim();
    if (!phone) { showToast(translations[currentLang].alertPhone); return; }
    const cleanPhone = phone.replace(/[\s()-]/g, '');
    currentUrl = 'sms:' + cleanPhone;
    if (text) { currentUrl += '?' + 'body=' + encodeURIComponent(text); }
    document.getElementById('urlBox').textContent = currentUrl;
    const qrContainer = document.getElementById('qrcode');
    qrContainer.innerHTML = '';
    new QRCode(qrContainer, { text: currentUrl, width: 220, height: 220, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
    document.getElementById('result').classList.add('visible');
  }
  function copyLink() {
    if (!currentUrl) return;
    navigator.clipboard.writeText(currentUrl).then(() => { showToast(translations[currentLang].copied); }).catch(() => {
      const ta = document.createElement('textarea'); ta.value = currentUrl; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); showToast(translations[currentLang].copied); } catch (e) {} document.body.removeChild(ta);
    });
  }
  function downloadQR() {
    const finalCanvas = document.createElement('canvas'); finalCanvas.width = 240; finalCanvas.height = 240;
    const ctx = finalCanvas.getContext('2d'); ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 240, 240);
    const qrContainer = document.getElementById('qrcode');
    const canvas = qrContainer.querySelector('canvas'); const img = qrContainer.querySelector('img');
    function finalize() { const link = document.createElement('a'); link.download = 'qr-campagne-sms.jpg'; link.href = finalCanvas.toDataURL('image/jpeg', 0.92); link.click(); }
    if (canvas) { ctx.drawImage(canvas, 10, 10, 220, 220); finalize(); }
    else if (img) { const tmp = new Image(); tmp.crossOrigin = 'anonymous'; tmp.onload = () => { ctx.drawImage(tmp, 10, 10, 220, 220); finalize(); }; tmp.src = img.src; }
  }
  function showToast(msg) { const toast = document.getElementById('toast'); toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500); }
  (function initGlow() {
    const card = document.querySelector('.card');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches; if (reduceMotion) return;
    const hasFinePointer = window.matchMedia('(pointer: fine)').matches; if (!hasFinePointer) return;
    let rafId = null;
    card.addEventListener('pointermove', (e) => { if (rafId) return; rafId = requestAnimationFrame(() => { const rect = card.getBoundingClientRect(); const x = ((e.clientX - rect.left) / rect.width) * 100; const y = ((e.clientY - rect.top) / rect.height) * 100; card.style.setProperty('--mx', x + '%'); card.style.setProperty('--my', y + '%'); rafId = null; }); });
    card.addEventListener('pointerenter', () => card.classList.add('glow'));
    card.addEventListener('pointerleave', () => card.classList.remove('glow'));
  })();
  setLang(detectInitialLang());
</script>

</body>
</html>
