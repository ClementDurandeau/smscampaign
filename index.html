<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de liens SMS</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px;
    color: #1a1a2e;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 520px;
    padding: 32px;
    position: relative;
  }
  .lang-switch {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 4px;
    background: #f0f0f5;
    border-radius: 8px;
    padding: 3px;
  }
  .lang-switch button {
    border: none;
    background: transparent;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    color: #666;
    transition: all 0.2s;
  }
  .lang-switch button.active {
    background: #764ba2;
    color: #fff;
  }
  h1 { font-size: 1.5rem; margin-bottom: 4px; padding-right: 120px; }
  .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
  label { display: block; font-weight: 600; margin: 16px 0 6px; font-size: 0.9rem; }
  input, textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #d0d0e0;
    border-radius: 8px;
    font-size: 1rem;
    font-family: inherit;
    transition: border 0.2s;
  }
  input:focus, textarea:focus { outline: none; border-color: #764ba2; }
  textarea { resize: vertical; min-height: 90px; }
  .char-count { text-align: right; font-size: 0.75rem; color: #999; margin-top: 4px; }
  button.action {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    transition: transform 0.1s, background 0.2s;
  }
  button.action:active { transform: scale(0.98); }
  .btn-generate {
    width: 100%;
    background: #764ba2;
    color: #fff;
    padding: 14px;
    margin-top: 24px;
  }
  .btn-generate:hover { background: #63408c; }
  .output {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid #eee;
    display: none;
  }
  .output.show { display: block; }
  .url-box {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .url-box input {
    flex: 1;
    background: #f8f8fc;
    font-size: 0.85rem;
  }
  .btn-copy {
    background: #2ecc71;
    color: #fff;
    padding: 0 18px;
    white-space: nowrap;
  }
  .btn-copy:hover { background: #27ae60; }
  .qr-container {
    text-align: center;
    padding: 20px;
    background: #f8f8fc;
    border-radius: 12px;
  }
  #qrcode { display: inline-block; padding: 10px; background: #fff; border-radius: 8px; }
  #qrcode img { display: block; }
  .btn-download {
    background: #3498db;
    color: #fff;
    padding: 12px 20px;
    margin-top: 16px;
  }
  .btn-download:hover { background: #2980b9; }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1a1a2e;
    color: #fff;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 0.9rem;
    opacity: 0;
    transition: all 0.3s;
    z-index: 1000;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>
  <div class="card">
    <div class="lang-switch">
      <button id="btn-fr" class="active" onclick="setLang('fr')">FR</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>

    <h1 data-i18n="title">Générateur de liens SMS</h1>
    <p class="subtitle" data-i18n="subtitle">Créez une campagne SMS en quelques secondes</p>

    <label data-i18n="phoneLabel">Numéro de téléphone</label>
    <input type="tel" id="phone" placeholder="+1 514 555 0123">

    <label data-i18n="textLabel">Message</label>
    <textarea id="text" maxlength="500" oninput="updateCount()" placeholder="Votre message..."></textarea>
    <div class="char-count"><span id="count">0</span> / 500</div>

    <button class="action btn-generate" onclick="generate()" data-i18n="generateBtn">Générer</button>

    <div class="output" id="output">
      <label data-i18n="urlLabel">Lien de campagne</label>
      <div class="url-box">
        <input type="text" id="url" readonly>
        <button class="action btn-copy" onclick="copyUrl()" data-i18n="copyBtn">Copier</button>
      </div>

      <div class="qr-container">
        <div id="qrcode"></div>
        <br>
        <button class="action btn-download" onclick="downloadQR()" data-i18n="downloadBtn">Télécharger le QR (JPG)</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const translations = {
    fr: {
      title: "Générateur de liens SMS",
      subtitle: "Créez une campagne SMS en quelques secondes",
      phoneLabel: "Numéro de téléphone",
      textLabel: "Message",
      generateBtn: "Générer",
      urlLabel: "Lien de campagne",
      copyBtn: "Copier",
      downloadBtn: "Télécharger le QR (JPG)",
      phonePlaceholder: "+1 514 555 0123",
      textPlaceholder: "Votre message...",
      alertPhone: "Veuillez saisir un numéro de téléphone.",
      copied: "Lien copié dans le presse-papiers !",
      docTitle: "Générateur de liens SMS"
    },
    en: {
      title: "SMS Link Generator",
      subtitle: "Create an SMS campaign in seconds",
      phoneLabel: "Phone number",
      textLabel: "Message",
      generateBtn: "Generate",
      urlLabel: "Campaign link",
      copyBtn: "Copy",
      downloadBtn: "Download QR (JPG)",
      phonePlaceholder: "+1 514 555 0123",
      textPlaceholder: "Your message...",
      alertPhone: "Please enter a phone number.",
      copied: "Link copied to clipboard!",
      docTitle: "SMS Link Generator"
    }
  };

  let currentLang = 'fr';

  function setLang(lang) {
    currentLang = lang;
    const t = translations[lang];
    document.documentElement.lang = lang;
    document.title = t.docTitle;

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key]) el.textContent = t[key];
    });

    document.getElementById('phone').placeholder = t.phonePlaceholder;
    document.getElementById('text').placeholder = t.textPlaceholder;

    document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  }

  function updateCount() {
    document.getElementById('count').textContent = document.getElementById('text').value.length;
  }

  function generate() {
    const phone = document.getElementById('phone').value.trim();
    const text = document.getElementById('text').value.trim();

    if (!phone) {
      showToast(translations[currentLang].alertPhone);
      return;
    }

    // Format cross-plateforme : ?& fonctionne sur iOS et Android
    const url = `sms:${phone}?&body=${encodeURIComponent(text)}`;
    document.getElementById('url').value = url;

    // Génère le QR code
    const qrDiv = document.getElementById('qrcode');
    qrDiv.innerHTML = '';
    new QRCode(qrDiv, {
      text: url,
      width: 220,
      height: 220,
      correctLevel: QRCode.CorrectLevel.M
    });

    document.getElementById('output').classList.add('show');
  }

  function copyUrl() {
    const urlInput = document.getElementById('url');
    urlInput.select();
    navigator.clipboard.writeText(urlInput.value).then(() => {
      showToast(translations[currentLang].copied);
    });
  }

  function downloadQR() {
    const img = document.querySelector('#qrcode img');
    const canvas = document.querySelector('#qrcode canvas');
    const source = img || canvas;

    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = 240;
    finalCanvas.height = 240;
    const ctx = finalCanvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, 240, 240);

    function finalize() {
      const link = document.createElement('a');
      link.download = 'qr-campagne-sms.jpg';
      link.href = finalCanvas.toDataURL('image/jpeg', 0.92);
      link.click();
    }

    if (canvas) {
      ctx.drawImage(canvas, 10, 10, 220, 220);
      finalize();
    } else if (img) {
      const tmp = new Image();
      tmp.crossOrigin = 'anonymous';
      tmp.onload = () => { ctx.drawImage(tmp, 10, 10, 220, 220); finalize(); };
      tmp.src = img.src;
    }
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // Initialise en français
  setLang('fr');
</script>
</body>
</html>
