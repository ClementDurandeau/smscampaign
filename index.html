<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#c2a8ff">
<meta name="format-detection" content="telephone=no">
<title>Générateur de liens SMS</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --glass-bg: rgba(255, 255, 255, 0.6);
    --glass-bg-solid: rgba(255, 255, 255, 0.92);
    --glass-border: rgba(255, 255, 255, 0.7);
    --glass-shadow: rgba(31, 38, 135, 0.15);
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --field-bg: rgba(255, 255, 255, 0.65);
    --field-border: rgba(0, 0, 0, 0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --glass-bg: rgba(30, 30, 40, 0.6);
      --glass-bg-solid: rgba(28, 28, 34, 0.94);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-shadow: rgba(0, 0, 0, 0.4);
      --accent: #0a84ff;
      --accent-hover: #409cff;
      --text-primary: #f5f5f7;
      --text-secondary: #a1a1a6;
      --field-bg: rgba(255, 255, 255, 0.08);
      --field-border: rgba(255, 255, 255, 0.12);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  html, body { height: 100%; }

  /* Fond : un calque fixe séparé du scroll, pour éviter le repaint/jank
     que provoque "background-attachment: fixed" sur mobile (surtout
     combiné à des flous animés). Le contenu, lui, peut défiler librement. */
  .bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: linear-gradient(135deg, #a8c0ff 0%, #c2a8ff 35%, #ffb8d9 70%, #ffd8a8 100%);
    overflow: hidden;
  }
  .bg::before, .bg::after {
    content: ""; position: absolute; border-radius: 50%;
    filter: blur(70px); opacity: 0.5; will-change: transform;
  }
  .bg::before { width: 320px; height: 320px; background: radial-gradient(circle, #ff9de6, transparent 70%); top: -80px; left: -60px; animation: float1 14s ease-in-out infinite; }
  .bg::after { width: 360px; height: 360px; background: radial-gradient(circle, #6ec3ff, transparent 70%); bottom: -100px; right: -80px; animation: float2 18s ease-in-out infinite; }
  @keyframes float1 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(40px, 30px) scale(1.1); } }
  @keyframes float2 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-35px, -20px) scale(1.05); } }

  /* Sur petits écrans : flous réduits et un peu moins d'opacité, moins
     coûteux pour le GPU des mobiles d'entrée de gamme et moins envahissant
     visuellement sur une carte plus étroite. */
  @media (max-width: 480px) {
    .bg::before { width: 220px; height: 220px; filter: blur(50px); opacity: 0.4; }
    .bg::after { width: 240px; height: 240px; filter: blur(50px); opacity: 0.4; }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    min-height: 100vh; min-height: 100dvh;
    display: flex; justify-content: center; align-items: center;
    padding: max(20px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    color: var(--text-primary); -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: contain;
  }

  .card {
    --mx: 50%; --my: 0%;
    position: relative; overflow: hidden; width: 100%; max-width: 440px;
    margin-block: auto; /* permet un vrai scroll si le contenu dépasse l'écran */
    background: var(--glass-bg); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%);
    border: 1px solid var(--glass-border); border-radius: 28px;
    box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 1px rgba(255, 255, 255, 0.4);
    padding: clamp(20px, 6vw, 40px);
  }
  /* Repli propre si backdrop-filter n'est pas supporté : fond quasi opaque
     pour garder un bon contraste de lecture. */
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    .card { background: var(--glass-bg-solid); }
  }
  .card::before { content: ""; position: absolute; inset: 0; border-radius: inherit; background: radial-gradient(600px circle at var(--mx) var(--my), rgba(255, 255, 255, 0.35), transparent 45%); opacity: 0; transition: opacity 0.4s ease; pointer-events: none; }
  .card.glow::before { opacity: 1; }
  .card > * { position: relative; }
  @media (prefers-color-scheme: dark) { .card::before { background: radial-gradient(600px circle at var(--mx) var(--my), rgba(255, 255, 255, 0.12), transparent 45%); } }

  h1 { font-size: clamp(20px, 5.5vw, 28px); font-weight: 700; text-align: center; letter-spacing: -0.02em; margin-bottom: 6px; }
  .subtitle { text-align: center; color: var(--text-secondary); font-size: clamp(13px, 3.5vw, 16px); margin-bottom: 28px; }
  label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .field { margin-bottom: 20px; }
  input, textarea {
    width: 100%; background: var(--field-bg); border: 1px solid var(--field-border);
    border-radius: 14px; padding: 14px 16px; font-size: 16px; /* >=16px : évite le zoom auto iOS */
    font-family: inherit; color: var(--text-primary);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input::placeholder, textarea::placeholder { color: var(--text-secondary); }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.2); }
  input:focus-visible, textarea:focus-visible, .btn:focus-visible, .btn-copy:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  textarea { resize: vertical; min-height: 90px; }

  .btn {
    width: 100%; min-height: 48px; border: none; border-radius: 14px; padding: 15px;
    font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
  }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(0, 113, 227, 0.4); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:active { transform: scale(0.97); }
  .result { margin-top: 28px; display: none; }
  .result.visible { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .url-row { display: flex; gap: 10px; align-items: stretch; }
  .url-box { flex: 1; min-width: 0; background: var(--field-bg); border: 1px solid var(--field-border); border-radius: 14px; padding: 14px 16px; font-size: 14px; word-break: break-all; color: var(--text-primary); }
  .btn-copy {
    flex-shrink: 0; min-height: 48px; min-width: 48px; background: var(--field-bg); border: 1px solid var(--field-border);
    color: var(--accent); border-radius: 14px; padding: 0 20px; font-size: 14px; font-weight: 600;
    cursor: pointer; touch-action: manipulation; transition: background 0.2s;
  }
  .btn-copy:hover { background: rgba(0, 113, 227, 0.1); }

  .qr-wrap { display: flex; flex-direction: column; align-items: center; margin-top: 24px; }
  #qrcode {
    background: #fff; padding: 12px; border-radius: 18px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    line-height: 0; max-width: 100%; display: inline-flex;
  }
  #qrcode img, #qrcode canvas { max-width: 100%; height: auto; }
  .btn-download { margin-top: 18px; background: var(--field-bg); border: 1px solid var(--field-border); color: var(--text-primary); }
  .btn-download:hover { background: rgba(0, 0, 0, 0.05); }

  .toast {
    position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 20px); left: 50%;
    transform: translateX(-50%) translateY(100px); max-width: calc(100vw - 32px);
    background: rgba(30, 30, 40, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: #fff; padding: 12px 24px; border-radius: 14px; font-size: 14px; font-weight: 500; text-align: center;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3); opacity: 0;
    transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1), opacity 0.4s; z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  @media (max-width: 400px) {
    .url-row { flex-direction: column; }
    .btn-copy { padding: 12px; width: 100%; }
  }

  /* Petites hauteurs (clavier ouvert en paysage, etc.) : on quitte le
     centrage vertical strict pour éviter que le haut de la carte soit
     coupé, et on laisse défiler normalement. */
  @media (max-height: 560px) {
    body { align-items: flex-start; }
    .card { margin-top: max(16px, env(safe-area-inset-top)); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; scroll-behavior: auto !important; }
    .bg::before, .bg::after { animation: none !important; }
    .card::before { transition: none !important; }
  }
</style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="card">
    <h1 id="title"></h1>
    <p class="subtitle" id="subtitle"></p>
    <div class="field">
      <label id="phoneLabel" for="phone"></label>
      <input type="tel" id="phone" inputmode="tel" autocomplete="tel" placeholder="">
    </div>
    <div class="field">
      <label id="textLabel" for="text"></label>
      <textarea id="text" placeholder=""></textarea>
    </div>
    <button class="btn btn-primary" id="generateBtn" onclick="generate()"></button>
    <div class="result" id="result">
      <div class="field" style="margin-top: 8px;">
        <label id="urlLabel"></label>
        <div class="url-row">
          <div class="url-box" id="urlBox"></div>
          <button class="btn-copy" id="copyBtn" onclick="copyLink()"></button>
        </div>
      </div>
      <div class="qr-wrap">
        <div id="qrcode"></div>
        <button class="btn btn-download" id="downloadBtn" onclick="downloadQR()"></button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
  const translations = {
    fr: { title: "Générateur de liens SMS", subtitle: "Créez une campagne SMS en quelques secondes", phoneLabel: "Numéro de téléphone", textLabel: "Message", generateBtn: "Générer", urlLabel: "Lien de campagne", copyBtn: "Copier", downloadBtn: "Télécharger le QR (JPG)", phonePlaceholder: "+33 6 12 34 56 78", textPlaceholder: "Votre message...", alertPhone: "Veuillez saisir un numéro de téléphone.", copied: "Lien copié dans le presse-papiers !", docTitle: "Générateur de liens SMS" },
    en: { title: "SMS Link Generator", subtitle: "Create an SMS campaign in seconds", phoneLabel: "Phone number", textLabel: "Message", generateBtn: "Generate", urlLabel: "Campaign link", copyBtn: "Copy", downloadBtn: "Download QR (JPG)", phonePlaceholder: "+1 514 555 0123", textPlaceholder: "Your message...", alertPhone: "Please enter a phone number.", copied: "Link copied to clipboard!", docTitle: "SMS Link Generator" }
  };
  const STORAGE_KEY = 'sms-tool-lang';
  let currentLang = 'fr';
  let currentUrl = '';

  function detectInitialLang() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved && translations[saved]) return saved;
    const nav = (navigator.language || 'fr').toLowerCase();
    if (nav.startsWith('en')) return 'en';
    if (nav.startsWith('fr')) return 'fr';
    return 'fr';
  }
  function setLang(lang) {
    if (!translations[lang]) return;
    currentLang = lang;
    try { localStorage.setItem(STORAGE_KEY, lang); } catch (e) {}
    const t = translations[lang];
    document.documentElement.lang = lang;
    document.title = t.docTitle;
    document.getElementById('title').textContent = t.title;
    document.getElementById('subtitle').textContent = t.subtitle;
    document.getElementById('phoneLabel').textContent = t.phoneLabel;
    document.getElementById('textLabel').textContent = t.textLabel;
    document.getElementById('generateBtn').textContent = t.generateBtn;
    document.getElementById('urlLabel').textContent = t.urlLabel;
    document.getElementById('copyBtn').textContent = t.copyBtn;
    document.getElementById('downloadBtn').textContent = t.downloadBtn;
    document.getElementById('phone').placeholder = t.phonePlaceholder;
    document.getElementById('text').placeholder = t.textPlaceholder;
  }

  // Taille de QR adaptative : pleine largeur disponible dans la carte,
  // plafonnée à 220px, pour ne jamais déborder sur les très petits écrans.
  function getQrSize() {
    const card = document.querySelector('.card');
    const cardInner = card.clientWidth - 2 * parseFloat(getComputedStyle(card).paddingLeft) - 24; // 24 = padding interne du cadre blanc
    return Math.max(140, Math.min(220, cardInner));
  }

  function generate() {
    const phone = document.getElementById('phone').value.trim();
    const text = document.getElementById('text').value.trim();
    if (!phone) { showToast(translations[currentLang].alertPhone); return; }
    const cleanPhone = phone.replace(/[\s()-]/g, '');
    currentUrl = 'sms:' + cleanPhone;
    if (text) { currentUrl += '?' + 'body=' + encodeURIComponent(text); }
    document.getElementById('urlBox').textContent = currentUrl;
    const qrContainer = document.getElementById('qrcode');
    qrContainer.innerHTML = '';
    const size = getQrSize();
    new QRCode(qrContainer, { text: currentUrl, width: size, height: size, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
    document.getElementById('result').classList.add('visible');
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  function copyLink() {
    if (!currentUrl) return;
    navigator.clipboard.writeText(currentUrl).then(() => { showToast(translations[currentLang].copied); }).catch(() => {
      const ta = document.createElement('textarea'); ta.value = currentUrl; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); showToast(translations[currentLang].copied); } catch (e) {} document.body.removeChild(ta);
    });
  }
  function downloadQR() {
    const qrContainer = document.getElementById('qrcode');
    const canvas = qrContainer.querySelector('canvas'); const img = qrContainer.querySelector('img');
    const px = (canvas ? canvas.width : (img ? img.naturalWidth : 220)) || 220;
    const padding = Math.round(px * 0.045) + 10;
    const total = px + padding * 2;
    const finalCanvas = document.createElement('canvas'); finalCanvas.width = total; finalCanvas.height = total;
    const ctx = finalCanvas.getContext('2d'); ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, total, total);
    function finalize() { const link = document.createElement('a'); link.download = 'qr-campagne-sms.jpg'; link.href = finalCanvas.toDataURL('image/jpeg', 0.92); link.click(); }
    if (canvas) { ctx.drawImage(canvas, padding, padding, px, px); finalize(); }
    else if (img) { const tmp = new Image(); tmp.crossOrigin = 'anonymous'; tmp.onload = () => { ctx.drawImage(tmp, padding, padding, px, px); finalize(); }; tmp.src = img.src; }
  }
  function showToast(msg) { const toast = document.getElementById('toast'); toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500); }

  (function initGlow() {
    const card = document.querySelector('.card');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches; if (reduceMotion) return;
    const hasFinePointer = window.matchMedia('(pointer: fine)').matches; if (!hasFinePointer) return;
    let rafId = null;
    card.addEventListener('pointermove', (e) => { if (rafId) return; rafId = requestAnimationFrame(() => { const rect = card.getBoundingClientRect(); const x = ((e.clientX - rect.left) / rect.width) * 100; const y = ((e.clientY - rect.top) / rect.height) * 100; card.style.setProperty('--mx', x + '%'); card.style.setProperty('--my', y + '%'); rafId = null; }); });
    card.addEventListener('pointerenter', () => card.classList.add('glow'));
    card.addEventListener('pointerleave', () => card.classList.remove('glow'));
  })();

  // Recalcule la taille du QR si la fenêtre est redimensionnée
  // (rotation d'écran, changement de fenêtre desktop) et qu'un QR existe déjà.
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { if (currentUrl) generate(); }, 250);
  });

  setLang(detectInitialLang());
</script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v4513226cdae34746b4dedf0b4dfa099e1781791509496" integrity="sha512-ZE9pZaUXND66v380QUtch/5sE9tPFh2zg45pR2PB0CVkCtOREv2AJKkSidISWkysEuQ0EH8faUU5du78bx87UQ==" data-cf-beacon='{"version":"2024.11.0","token":"8607d2a720d14b038279025b2b5a82e5","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
